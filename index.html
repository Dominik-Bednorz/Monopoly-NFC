<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="startgamescreen">
        <button id="playbutton">Spiel starten</button>
    </div>

    <div id="main">

        <div id="lobby">
            <h1>Warte auf Spieler...</h1>
            <p class="blinken" id="1">Hund</p>
            <p class="blinken" id="2">Safe</p>
            <p class="blinken" id="3">Flugzeug</p>
            <p class="blinken" id="4">Auto</p>
        </div>
        
        <div id="feldINFO-popup">
            <h2 id="feldINFO-popup-title"></h2>
            <p id="feldINFO-popup-preis"></p>
            <button id="feldINFO-popup-button">OK</button>
        </div>

    </div>

    <div class="debug" id="debug" class="invisible">
    <p>Console:</p>
    <br>
    </div>

    <script src="app.js"></script>
</body>
</html>
