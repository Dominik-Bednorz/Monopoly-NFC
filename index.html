<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="startgamescreen">
        <button id="playbutton">Spiel starten</button>
        <button id="playbutton_console">Spiel starten mit Console</button>
    </div>

    <div id="main">

        <div id="lobby">
            <h1>Warte auf Spieler...</h1>
            <p class="blinken" id="1">Hund</p>
            <p class="blinken" id="2">Safe</p>
            <p class="blinken" id="3">Flugzeug</p>
            <p class="blinken" id="4">Auto</p>
        </div>
        
        <div id="feldINFO-popup" class="invisible">
            <h2 id="feldINFO-popup-title"></h2>
            <p id="feldINFO-popup-preis"></p>
            <button id="feldINFO-popup-button" onclick="feldINFO_ausblenden()">Abbrechen</button>
        </div>

        <div id="EreigniskarteINFO-popup" class="invisible">
            <h2 id="EreigniskarteINFO-popup-title"></h2>
            <p id="EreigniskarteINFO-popup-beschreibung"></p>
            <button id="EreigniskarteINFO-popup-button" onclick="EreigniskarteINFO_ausblenden()">Abbrechen</button>
        </div>

        <div id="player-buttons" class="invisible">
            <button onclick="LOS_button()">LOS</button>
            <button onclick="">Auktion</button>
            <button onclick="Gefängnis_button()">Gefängnis</button>
            <button onclick="Fliegen_button()">Fliegen</button>
            <button onclick="">Tausch</button>
        </div>
    </div>

    <div class="debug invisible" id="debug">
    <p>Console:</p>
    <br>
    </div>

    <script src="app.js"></script>
</body>
</html>
